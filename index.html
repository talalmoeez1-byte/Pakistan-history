<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fractured Cradle: Partition Trauma and the History of Pakistan</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --accent-color: #c9a054;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 40px 20px;
            text-align: center;
            background-color: #0b0b0b;
        }

        header h1 {
            font-size: 2.3rem;
            color: #ffffff;
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        header p {
            color: var(--accent-color);
            font-style: italic;
            font-size: 1.1rem;
        }

        nav {
            display: flex;
            justify-content: center;
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            overflow-x: auto;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 15px 20px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        nav button:hover {
            color: #ffffff;
        }

        nav button.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            font-weight: normal;
        }

        h3 {
            font-size: 1.4rem;
            color: var(--accent-color);
            margin-top: 30px;
            margin-bottom: 15px;
            font-weight: normal;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            text-align: justify;
        }

        blockquote {
            border-left: 3px solid var(--accent-color);
            padding-left: 20px;
            font-style: italic;
            color: #ffffff;
            margin: 30px 0;
            background-color: var(--bg-secondary);
            padding: 20px;
        }

        .split-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid var(--border-color);
            margin-bottom: 40px;
            background: #000;
        }

        .hero-panel {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero-panel:first-child {
            border-right: 1px solid var(--border-color);
            background-color: #151515;
        }

        .hero-title {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        /* Timeline Styles */
        .timeline-container {
            margin: 40px 0;
            position: relative;
            padding-left: 30px;
            border-left: 2px solid var(--border-color);
        }

        .timeline-item {
            margin-bottom: 40px;
            position: relative;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -41px;
            top: 5px;
            background: var(--accent-color);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 4px solid var(--bg-primary);
        }

        .timeline-year {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .timeline-title {
            font-size: 1.2rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.95rem;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            text-align: left;
        }

        th {
            background-color: var(--bg-secondary);
            color: #ffffff;
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #161616;
        }

        .bar-chart-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 30px;
            margin: 30px 0;
        }

        .bar-group {
            margin-bottom: 20px;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.9rem;
        }

        .bar-wrapper {
            background: #111;
            height: 25px;
            width: 100%;
            border: 1px solid #444;
        }

        .bar-fill {
            background: var(--accent-color);
            height: 100%;
        }

        .flowchart {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }

        .flow-node {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 25px;
            position: relative;
        }

        .flow-node::after {
            content: "↓";
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        .flow-node:last-child::after {
            display: none;
        }

        .node-title {
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bib-item {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .bib-citation {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 10px;
            text-indent: -30px;
            padding-left: 30px;
        }

        .bib-annotation {
            color: var(--text-muted);
            font-size: 1rem;
            text-align: justify;
            padding-left: 30px;
        }

        @media (max-width: 768px) {
            .split-hero {
                grid-template-columns: 1fr;
            }
            .hero-panel:first-child {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>The Fractured Cradle: Partition Trauma and the History of Pakistan</h1>
        <p>A Critical Evaluation of Structural, Minority, and Transgenerational Wounds</p>
    </header>

        <button class="nav-btn" onclick="openTab(event, 'human-toll')">The Human Toll</button>
        <button class="nav-btn" onclick="openTab(event, 'political-fracture')">The Political Fracture</button>
        <button class="nav-btn" onclick="openTab(event, 'minority-ultimatum')">The Minority
